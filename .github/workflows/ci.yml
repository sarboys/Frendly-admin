name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  admin:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build internal portal
        env:
          VITE_API_BASE_URL: https://api.frendly.tech
          VITE_ADMIN_PORTAL: internal
        run: npm run build

      - name: Build partner portal
        env:
          VITE_API_BASE_URL: https://api.frendly.tech
          VITE_ADMIN_PORTAL: partner
        run: npm run build
